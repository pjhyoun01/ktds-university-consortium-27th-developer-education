<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Document</title>
    <link rel="stylesheet" type="text/css" href="./dynamicRow.css" />
    <script type="text/javascript" src="../../../jQuery/jquery-4.0.0.slim.min.js"></script>
    <script type="text/javascript" src="./dynamicRow.js"></script>
  </head>
  <body>
    <div class="wrapper">
      <!-- 
        코드 작성자 : 박재현

        add-row-button을 클릭하면 list에 list item이 추가된다. 
        list item의 내용은 input에 작성한 내용으로 채워져야 한다.
        list item이 추가된 후 input의 내용은 공백으로 초기화 된다.

        list item을 더블클릭하면 클릭된 아이템은 삭제한다.
        -->
      <div class="input-form">
        <button class="add-row-button">Row 추가</button>
        <input type="text" placeholder="row text" />
      </div>
      <ul class="list"></ul>
    </div>
  </body>
</html>
