<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8"/>
        <title>스타일 연습</title>
        <style type="text/css">
            div {
                color: #000000;
                font-size: 12px;
            }
            p {
                font-size: 24px;
                font-weight: 100;
            }

            span {
                background-color: yellow;
                color: red;
                font-weight: 900;
                text-decoration: underline;
            }
            h1, h2, h3, h4, h5, h6 {
                color: cyan;
            }
            

        </style>
    </head>
<body>
    <div>영역을 나눠요 1</div>    
    <div>영역을 나눠요 2</div>    

    <p>단락을 만들어요 1</p>
    <p>단락을 만들어요 2</p>

    <span>단어를 강조해요 1</span>
    <span>단어를 강조해요 2</span>

    <h1>큰 글자</h1>
    <h2>조금 큰 글자</h2>
    <h3>보통 큰 글자</h3>
    <h4>보통 작은 글자</h4>
    <h5>조금 작은 글자</h5>
    <h6>큰 작은 글자</h6>
</body>
</html>
