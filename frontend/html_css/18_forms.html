<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Document</title>
    <link rel="stylesheet" type="text/css" href="./18_forms.css" />
  </head>
  <body>
    <div class="grid">
      <label for="email">이메일</label>
      <input type="email" name="" id="email" />
      <label for="password">비밀번호</label>
      <input type="password" name="" id="password" />

      <label>성별</label>
      <div>
        <input type="radio" name="gender" id="male" />
        <label for="male">남</label>

        <input type="radio" name="gender" id="female" />
        <label for="female">여</label>
      </div>

      <label for="insta">가입경로</label>
      <div>
        <input type="checkbox" name="channel" id="insta" />
        <label for="insta">인스타</label>
        <input type="checkbox" name="channel" id="x" />
        <label for="x">X</label>
        <input type="checkbox" name="channel" id="introduce" />
        <label for="introduce">지인 소개</label>
        <input type="checkbox" name="channel" id="youtube" />
        <label for="youtube">유튜브</label>
      </div>

      <label for="jobs">직업</label>
      <select id="jobs">
        <option>선택</option>
        <option>개발자</option>
        <option>일반인</option>
        <option>학생</option>
        <option>주부</option>
      </select>
    </div>
  </body>
</html>
